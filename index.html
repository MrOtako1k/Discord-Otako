<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Otako</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&family=Syne:wght@800;900&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}

body{
  font-family:'Cairo',sans-serif;
  background:#04060f;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* ── BACKGROUND ── */
canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

.bg-orb{
  position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;
}
.o1{width:600px;height:600px;background:rgba(88,101,242,.13);top:-200px;right:-150px;animation:ob 22s ease-in-out infinite;}
.o2{width:500px;height:500px;background:rgba(255,0,80,.08);bottom:-150px;left:-100px;animation:ob 28s ease-in-out infinite reverse;}
.o3{width:350px;height:350px;background:rgba(0,200,255,.07);top:50%;left:40%;animation:ob 18s ease-in-out infinite 5s;}
@keyframes ob{0%,100%{transform:translate(0,0);}50%{transform:translate(30px,-25px);}}

/* ── GRID ── */
.grid-bg{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);
  background-size:55px 55px;
  mask-image:radial-gradient(ellipse 70% 70% at 50% 50%,black,transparent);
}

/* ── CARD ── */
.card{
  position:relative;z-index:10;
  text-align:center;
  padding:0 30px;
  animation:fadeUp .9s cubic-bezier(.22,1,.36,1) both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(40px);}to{opacity:1;transform:translateY(0);}}

/* Logo */
.logo-wrap{
  margin-bottom:36px;
  display:flex;flex-direction:column;align-items:center;gap:16px;
}
.logo-icon{
  width:80px;height:80px;
  background:linear-gradient(135deg,#5865F2,#8b5cf6);
  border-radius:22px;
  display:flex;align-items:center;justify-content:center;
  font-size:2.2em;
  box-shadow:0 0 50px rgba(88,101,242,.45), 0 0 100px rgba(88,101,242,.15);
  animation:pulse-logo 3s ease-in-out infinite;
}
@keyframes pulse-logo{
  0%,100%{box-shadow:0 0 50px rgba(88,101,242,.45),0 0 100px rgba(88,101,242,.15);}
  50%{box-shadow:0 0 70px rgba(88,101,242,.7),0 0 140px rgba(88,101,242,.25);}
}
.logo-name{
  font-family:'Syne',sans-serif;
  font-size:2.8em;font-weight:900;
  letter-spacing:-.02em;
  background:linear-gradient(120deg,#fff 30%,rgba(255,255,255,.5));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.logo-sub{
  font-size:.9em;
  color:rgba(255,255,255,.35);
  font-weight:300;
  letter-spacing:.05em;
}

/* Divider */
.divider{
  width:40px;height:2px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);
  margin:0 auto 36px;
}

/* Buttons */
.links{
  display:flex;flex-direction:column;gap:14px;
  width:100%;max-width:360px;
  margin:0 auto;
}

.link-btn{
  display:flex;align-items:center;
  padding:18px 26px;border-radius:16px;
  text-decoration:none;color:#fff;
  border:1px solid rgba(255,255,255,.08);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1), box-shadow .3s ease, border-color .3s;
  position:relative;overflow:hidden;
  cursor:pointer;
}

/* shimmer on hover */
.link-btn::before{
  content:"";
  position:absolute;top:0;left:-100%;
  width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.07),transparent);
  transition:left .5s ease;
  pointer-events:none;
}
.link-btn:hover::before{left:150%;}

.link-btn:hover{
  transform:translateY(-4px) scale(1.01);
}

/* Discord */
.btn-discord{
  background:linear-gradient(135deg,rgba(88,101,242,.2),rgba(88,101,242,.08));
  border-color:rgba(88,101,242,.35);
}
.btn-discord:hover{
  box-shadow:0 12px 40px rgba(88,101,242,.4), 0 0 0 1px rgba(88,101,242,.5);
  border-color:rgba(88,101,242,.7);
}

/* YouTube */
.btn-youtube{
  background:linear-gradient(135deg,rgba(255,0,0,.18),rgba(255,0,0,.06));
  border-color:rgba(255,0,0,.3);
}
.btn-youtube:hover{
  box-shadow:0 12px 40px rgba(255,0,0,.35), 0 0 0 1px rgba(255,0,0,.5);
  border-color:rgba(255,0,0,.6);
}

.btn-icon{
  width:44px;height:44px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.3em;flex-shrink:0;
  margin-left:18px;
}
.discord-icon{background:rgba(88,101,242,.25);color:#7289da;}
.youtube-icon{background:rgba(255,0,0,.2);color:#ff4444;}

.btn-text{text-align:right;flex:1;}
.btn-title{font-weight:700;font-size:1em;display:block;margin-bottom:3px;}
.btn-desc{font-size:.78em;color:rgba(255,255,255,.4);font-weight:300;}

.btn-arrow{
  font-size:.85em;color:rgba(255,255,255,.25);
  margin-right:auto;
  transition:transform .3s, color .3s;
}
.link-btn:hover .btn-arrow{transform:translateX(-4px);color:rgba(255,255,255,.6);}

/* Online badge */
.online-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(35,209,96,.1);border:1px solid rgba(35,209,96,.25);
  color:rgba(35,209,96,.9);
  padding:5px 14px;border-radius:50px;
  font-size:.75em;font-weight:600;
  margin-bottom:30px;
}
.online-badge span{
  width:7px;height:7px;background:#23d160;border-radius:50%;
  animation:blink 2s infinite;
  flex-shrink:0;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}

/* Invite refresh badge */
.refresh-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(88,101,242,.1);border:1px solid rgba(88,101,242,.2);
  color:rgba(180,185,255,.7);
  padding:4px 12px;border-radius:50px;
  font-size:.7em;font-weight:500;
  margin-bottom:14px;
}
.refresh-badge i{font-size:.85em;opacity:.7;}

/* Footer */
.footer-note{
  margin-top:34px;
  font-size:.75em;
  color:rgba(255,255,255,.2);
  letter-spacing:.03em;
}

/* Mobile */
@media(max-width:480px){
  .logo-name{font-size:2.2em;}
  .link-btn{padding:16px 20px;}
  .btn-icon{margin-left:14px;}
}
</style>
</head>
<body>

<div class="bg-orb o1"></div>
<div class="bg-orb o2"></div>
<div class="bg-orb o3"></div>
<div class="grid-bg"></div>
<canvas id="c"></canvas>

<div class="card">

  <!-- Logo -->
  <div class="logo-wrap">
    <div class="logo-icon"><i class="fab fa-discord"></i></div>
    <div>
      <div class="logo-name">Family Otako</div>
      <div class="logo-sub">مجتمع الألعاب الأول • SA-MP</div>
    </div>
  </div>

  <!-- Status -->
  <div class="online-badge">
    <span></span>
    السيرفر شغّال الآن
  </div>

  <!-- Invite refresh info -->
  <div class="refresh-badge" id="refreshBadge">
    <i class="fas fa-sync-alt"></i>
    <span id="refreshCountdown">جاري تحميل الرابط...</span>
  </div>

  <div class="divider"></div>

  <!-- Links -->
  <div class="links">

    <a href="#" id="discordBtn" target="_blank" class="link-btn btn-discord">
      <div class="btn-icon discord-icon"><i class="fab fa-discord"></i></div>
      <div class="btn-text">
        <span class="btn-title">سيرفر Discord</span>
        <span class="btn-desc" id="discordBtnDesc">انضم للمجتمع الآن</span>
      </div>
      <i class="fas fa-arrow-left btn-arrow"></i>
    </a>

    <a href="https://youtube.com/@mrotako-1k" target="_blank" class="link-btn btn-youtube">
      <div class="btn-icon youtube-icon"><i class="fab fa-youtube"></i></div>
      <div class="btn-text">
        <span class="btn-title">قناة YouTube</span>
        <span class="btn-desc">شاهد آخر الفيديوهات</span>
      </div>
      <i class="fas fa-arrow-left btn-arrow"></i>
    </a>

  </div>

  <div class="footer-note">© 2026 Family Otako</div>

</div>

<script>
/* ══════════════════════════════════════════════
   🔗 Discord Invite Auto-Renewal System
   يتجدد الرابط كل 5 أيام تلقائياً عبر Webhook
   ══════════════════════════════════════════════ */

const WEBHOOK_URL = "https://discord.com/api/webhooks/1482794405575266364/BCHR_Lh1iIB2jloU6jrIHBy9uU0QPDJuGV1g1Vpq6Y8b4yDDzqTBANvRC26Rqf2knF17";

// مفتاح التخزين المحلي
const STORAGE_KEY = "family_otako_invite";
const RENEWAL_DAYS = 5; // عدد الأيام قبل التجديد

// ── دالة تحميل/حفظ بيانات الدعوة من localStorage ──
function loadInviteData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) { return null; }
}

function saveInviteData(code, timestamp) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ code, timestamp }));
}

// ── حساب باقي الوقت حتى التجديد ──
function timeUntilRenewal(timestamp) {
  const renewalMs = RENEWAL_DAYS * 24 * 60 * 60 * 1000;
  const elapsed = Date.now() - timestamp;
  return Math.max(0, renewalMs - elapsed);
}

function formatCountdown(ms) {
  if (ms <= 0) return "يجري التجديد الآن...";
  const days  = Math.floor(ms / (1000 * 60 * 60 * 24));
  const hours = Math.floor((ms % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const mins  = Math.floor((ms % (1000 * 60 * 60)) / (1000 * 60));
  if (days > 0)  return `يتجدد بعد ${days} يوم و${hours} ساعة`;
  if (hours > 0) return `يتجدد بعد ${hours} ساعة و${mins} دقيقة`;
  return `يتجدد بعد ${mins} دقيقة`;
}

// ── إرسال إشعار عبر Webhook ──
async function notifyWebhook(inviteCode, renewedAt) {
  const msg = {
    username: "Family Otako - Link Manager",
    avatar_url: "https://cdn.discordapp.com/emojis/1234567890.png",
    embeds: [{
      title: "🔄 تم تجديد رابط الدعوة",
      description: `تم تحديث رابط السيرفر تلقائياً`,
      color: 5793266, // #5865F2
      fields: [
        {
          name: "🔗 الرابط الجديد",
          value: `https://discord.gg/${inviteCode}`,
          inline: false
        },
        {
          name: "📅 وقت التجديد",
          value: new Date(renewedAt).toLocaleString("ar-SA", {
            timeZone: "Asia/Riyadh",
            dateStyle: "full",
            timeStyle: "short"
          }),
          inline: false
        },
        {
          name: "⏳ التجديد القادم",
          value: `بعد ${RENEWAL_DAYS} أيام`,
          inline: true
        }
      ],
      footer: { text: "Family Otako • نظام إدارة الروابط" },
      timestamp: new Date(renewedAt).toISOString()
    }]
  };

  try {
    await fetch(WEBHOOK_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(msg)
    });
  } catch(e) {
    console.warn("⚠️ فشل إرسال إشعار الويبهوك:", e.message);
  }
}

// ── إنشاء رابط دعوة جديد عبر API ──
// ملاحظة: هذا يتطلب Bot Token لإنشاء Invite حقيقي.
// هنا نستخدم الرابط الثابت مع إرسال إشعار التجديد عبر الويبهوك.
// لتجديد تلقائي كامل، يجب استخدام خادم (server-side) مع Bot Token.
async function renewInvite() {
  // الرابط الحالي الثابت — سيتم استبداله بالرابط الجديد عند التجديد
  const currentCode = "ThChbCR8x";
  const now = Date.now();

  saveInviteData(currentCode, now);
  await notifyWebhook(currentCode, now);

  return currentCode;
}

// ── تحديث زر Discord ──
function applyInviteCode(code) {
  const btn = document.getElementById("discordBtn");
  if (btn) btn.href = `https://discord.gg/${code}`;
}

// ── تحديث عداد التجديد في الواجهة ──
function updateCountdownUI(timestamp) {
  const el = document.getElementById("refreshCountdown");
  if (!el) return;
  const ms = timeUntilRenewal(timestamp);
  el.textContent = formatCountdown(ms);
}

// ── المنطق الرئيسي ──
async function initInviteSystem() {
  let data = loadInviteData();
  const now = Date.now();

  // إذا لا يوجد بيانات أو انتهت صلاحية 5 أيام → جدد
  if (!data || timeUntilRenewal(data.timestamp) <= 0) {
    const code = await renewInvite();
    data = loadInviteData(); // أعد القراءة بعد الحفظ
    applyInviteCode(code);
  } else {
    applyInviteCode(data.code);
  }

  // حدّث العداد فوراً
  if (data) updateCountdownUI(data.timestamp);

  // عداد تنازلي يتحدث كل دقيقة
  setInterval(() => {
    const d = loadInviteData();
    if (!d) return;

    if (timeUntilRenewal(d.timestamp) <= 0) {
      // حان وقت التجديد
      renewInvite().then(code => {
        applyInviteCode(code);
        const fresh = loadInviteData();
        if (fresh) updateCountdownUI(fresh.timestamp);
      });
    } else {
      updateCountdownUI(d.timestamp);
    }
  }, 60 * 1000); // كل دقيقة
}

// شغّل النظام عند تحميل الصفحة
initInviteSystem();

/* ══════════════════════════════════════════════
   Floating particles
   ══════════════════════════════════════════════ */
const cv=document.getElementById('c');
const ctx=cv.getContext('2d');
let W,H,pts=[];
const resize=()=>{W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;};
resize();window.addEventListener('resize',resize);
class P{
  constructor(){this.reset(true);}
  reset(init=false){
    this.x=Math.random()*W;
    this.y=init?Math.random()*H:H+5;
    this.vx=(Math.random()-.5)*.25;
    this.vy=-(Math.random()*.4+.15);
    this.a=Math.random()*.25+.05;
    this.r=Math.random()*1.2+.4;
    this.col=Math.random()>.5?'88,101,242':'200,100,255';
  }
  update(){
    this.x+=this.vx;this.y+=this.vy;this.a-=.0003;
    if(this.y<-10||this.a<=0)this.reset();
  }
  draw(){
    ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(${this.col},${this.a})`;ctx.fill();
  }
}
for(let i=0;i<60;i++)pts.push(new P());
(function frame(){
  ctx.clearRect(0,0,W,H);
  pts.forEach(p=>{p.update();p.draw();});
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
